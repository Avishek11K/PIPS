<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avishek | Explorer</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px 60px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #2575fc;
            margin-bottom: 15px;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            color: #333;
        }

        p {
            margin-top: 10px;
            color: #666;
        }

        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: #2575fc;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn:hover {
            background: #1a5edb;
        }

        /* 🔥 Cursor Effect */
        #title::after, #desc::after {
            content: "|";
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% {opacity: 1;}
            50% {opacity: 0;}
            100% {opacity: 1;}
        }
    </style>
</head>

<body>

    <div class="card">

        <!-- 🖼 Image -->
        <img src="https://scontent.fktm20-1.fna.fbcdn.net/v/t39.30808-6/453873111_848155047418938_3754013468886885140_n.jpg?stp=cp6_dst-jpg_tt6&_nc_cat=110&ccb=1-7&_nc_sid=1d70fc&_nc_ohc=1wv6VsJHpDcQ7kNvwGVULt7&_nc_oc=AdqQufv4aFHsBUmtbxbV1vkzy8k3OaTve2IdZ-ZxWEZGbbr1D58WBcLxobDY2ohM3y0_hSNTy6MnCLPU1tCP3CZx&_nc_zt=23&_nc_ht=scontent.fktm20-1.fna&_nc_gid=KGh6G16MaS6V-cgmyZwSeQ&_nc_ss=7a3a8&oh=00_Af2_Eae92cJNHX4A9VLW124cT2Aky4KrDJFCZ0szEzbEpw&oe=69DF9111"
        class="profile-img">

        <!-- 🔥 Typing Text -->
        <h1 id="title"></h1>
        <p id="desc"></p>

        <button class="btn">Explore More</button>
    </div>

    <script>
        const titleText = "An Explorer Avishek";
        const descText = "Will be there after some months to hustle all my intuition, experience together";

        let i = 0;
        let j = 0;

        function typeTitle() {
            if (i < titleText.length) {
                document.getElementById("title").innerHTML += titleText.charAt(i);
                i++;
                setTimeout(typeTitle, 80);
            } else {
                setTimeout(typeDesc, 300);
            }
        }

        function typeDesc() {
            if (j < descText.length) {
                document.getElementById("desc").innerHTML += descText.charAt(j);
                j++;
                setTimeout(typeDesc, 40);
            }
        }

        window.onload = typeTitle;
    </script>

</body>
</html>
