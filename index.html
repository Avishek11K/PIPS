<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avishek | Explorer</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px 60px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        /* 🔵 Circular Image */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid;
            margin-bottom: 15px;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            color: #333;
        }

        p {
            margin-top: 10px;
            color: #666;
        }

        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: #2575fc;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn:hover {
            background: #1a5edb;
        }
    </style>
</head>

<body>

    <div class="card">

        <!-- 🖼 Your Image -->
